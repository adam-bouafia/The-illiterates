# Backend ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: guestbook
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "guestbook"

---
# Backend Deployment - simple HTTP API using a Python container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: guestbook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      tier: api
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
      - name: api
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        command: ["/bin/sh", "-c"]
        args:
        - |
          cat > /usr/share/nginx/html/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <body>
          <h2>Guestbook API</h2>
          <p>Status: Running</p>
          <p>Database: Connected to PostgreSQL</p>
          <p>Pod: HOSTNAME_PLACEHOLDER</p>
          </body>
          </html>
          HTMLEOF
          sed -i "s/HOSTNAME_PLACEHOLDER/$(hostname)/" /usr/share/nginx/html/index.html
          cat > /usr/share/nginx/html/health << 'EOF'
          {"status": "ok"}
          EOF
          nginx -g 'daemon off;'
        envFrom:
        - configMapRef:
            name: backend-config
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: guestbook
spec:
  selector:
    app: backend
    tier: api
  ports:
  - port: 80
    targetPort: 80