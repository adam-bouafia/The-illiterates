# Frontend ConfigMap - nginx config with reverse proxy to backend
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: guestbook
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

---
